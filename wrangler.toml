name = "utopia-blog"
compatibility_date = "2026-03-28"
compatibility_flags = ["nodejs_compat"]
main = ".open-next/worker.js"

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "utopia-db"
database_id = "4aaec7d3-885e-46b4-97f5-ac6a8989fad2"

# R2 Bucket
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "utopia-images"

[vars]
NEXT_PUBLIC_IMAGE_URL = "/.pic/"

# Custom domain routing
routes = [
  { pattern = "gaochengzhi.com/*", zone_name = "gaochengzhi.com" },
  { pattern = "www.gaochengzhi.com/*", zone_name = "gaochengzhi.com" }
]
workers_dev = true
