# Nginx Security Configuration for gaochengzhi.com
# Location: /etc/nginx/sites-available/gaochengzhi.com
#
# This is a reference configuration - adjust according to your actual setup

# Rate limiting zones (put this in http block or nginx.conf)
# limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
# limit_req_zone $binary_remote_addr zone=api:10m rate=5r/s;
# limit_conn_zone $binary_remote_addr zone=conn:10m;

server {
    listen 80;
    server_name gaochengzhi.com www.gaochengzhi.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name gaochengzhi.com www.gaochengzhi.com;

    # SSL Configuration (adjust paths to your certificates)
    ssl_certificate /etc/letsencrypt/live/gaochengzhi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gaochengzhi.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:;" always;

    # Connection limits
    limit_conn conn 20;

    # ============================================
    # Block common scanner paths (return 444 = silent drop)
    # ============================================
    location ~* \.(php|asp|aspx|jsp|cgi)$ {
        return 444;
    }

    location ~* ^/(wp-admin|wp-content|wp-includes|wordpress|xmlrpc|phpmyadmin) {
        return 444;
    }

    location ~* ^/(admin|administrator|manager|console|debug|shell|eval) {
        return 444;
    }

    location ~* \.(env|git|svn|htaccess|htpasswd|sql|bak|backup|old|swp)$ {
        return 444;
    }

    location ~* ^/(config|setup|install)\.php {
        return 444;
    }

    # Block ThinkPHP and other common exploits
    location ~* (thinkphp|vendor|ckeditor|fckeditor|elfinder|filemanager) {
        return 444;
    }

    # ============================================
    # Block bad user agents
    # ============================================
    if ($http_user_agent ~* (sqlmap|nikto|nmap|masscan|zgrab|scanner|attack|exploit)) {
        return 403;
    }

    # Block empty user agents (often scanners)
    if ($http_user_agent = "") {
        return 403;
    }

    # ============================================
    # API Rate Limiting (stricter)
    # ============================================
    location /api/ {
        limit_req zone=api burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8888;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ============================================
    # Main application proxy
    # ============================================
    location / {
        limit_req zone=general burst=20 nodelay;

        proxy_pass http://127.0.0.1:8888;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ============================================
    # Static files caching
    # ============================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://127.0.0.1:8888;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ============================================
    # Logging (optional: separate log for blocked requests)
    # ============================================
    access_log /var/log/nginx/gaochengzhi.com.access.log;
    error_log /var/log/nginx/gaochengzhi.com.error.log;
}

# ============================================
# IMPORTANT: Add these to your nginx.conf http block:
# ============================================
#
# http {
#     # Rate limiting zones
#     limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
#     limit_req_zone $binary_remote_addr zone=api:10m rate=5r/s;
#     limit_conn_zone $binary_remote_addr zone=conn:10m;
#
#     # Hide nginx version
#     server_tokens off;
#
#     # ... rest of your config
# }
#
# ============================================
# After editing, test and reload:
# ============================================
#
# sudo nginx -t
# sudo systemctl reload nginx
