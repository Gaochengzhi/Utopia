name: Cloudflare CI and Manual Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build content index
        run: node scripts/build-content-index.mjs

      - name: Build for Cloudflare Workers
        run: npm run cf:build


  deploy:
    if: github.event_name == 'workflow_dispatch'
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build content index
        run: node scripts/build-content-index.mjs

      - name: Build for Cloudflare Workers
        run: npm run cf:build

      - name: Deploy to Production
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Health check after deployment (non-blocking)
      - name: Health Check
        continue-on-error: true
        run: |
          echo "Waiting 10 seconds for deployment to propagate..."
          sleep 10
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://utopia-blog.gaochengzhi1999.workers.dev/)
          echo "Workers.dev response: $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "🎉 Health check passed!"
          else
            echo "⚠️ Health check returned $HTTP_CODE (may be WAF/propagation delay)"
          fi
