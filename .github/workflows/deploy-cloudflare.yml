name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build content index
        run: node scripts/build-content-index.mjs

      - name: Build for Cloudflare Workers
        run: npx opennextjs-cloudflare build && rm -rf .open-next/assets/.pic .open-next/assets/photography


      # Deploy to production (main branch push)
      - name: Deploy to Production
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Deploy preview (PRs)
      - name: Deploy Preview
        if: github.event_name == 'pull_request'
        run: npx wrangler deploy --env preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Health check after production deploy (non-blocking)
      - name: Health Check
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        run: |
          echo "Waiting 10 seconds for deployment to propagate..."
          sleep 10
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://utopia-blog.gaochengzhi1999.workers.dev/)
          echo "Workers.dev response: $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "🎉 Health check passed!"
          else
            echo "⚠️ Health check returned $HTTP_CODE (may be WAF/propagation delay)"
          fi

